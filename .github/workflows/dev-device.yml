name: Development Build - iOS Device

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  check_last_build:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_time.outputs.should_build }}
    steps:
      - id: check_time
        run: |
          CURRENT_TIME=$(date +%s)
          LAST_RUN=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/dev-device.yml/runs?status=completed&per_page=1" \
            | jq -r '.workflow_runs[0].created_at // empty')

          if [ -z "$LAST_RUN" ]; then
            echo "No previous runs found. Proceeding with build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            HOURS_SINCE=$(( ($CURRENT_TIME - $(date -d "$LAST_RUN" +%s)) / 3600 ))
            if [ "$HOURS_SINCE" -ge "2" ]; then
              echo "Over 2 hours since last build. Building."
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "Less than 2 hours since last build. Skipping."
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: check_last_build
    if: needs.check_last_build.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build app
        run: eas build --platform ios --profile development --non-interactive
